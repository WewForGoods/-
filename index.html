<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة ثلاث حروف</title>
    <style>
        body { 
            background-color: #121212; 
            color: #ffffff; 
            font-family: Arial, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
        }
        h2 { color: #4CAF50; }
        input { 
            padding: 10px; 
            font-size: 20px; 
            text-align: center; 
            border-radius: 5px; 
            border: 2px solid #3a3a3c; 
            background-color: #2b2b2b;
            color: white;
            margin: 5px; 
            width: 150px;
        }
        button { 
            padding: 10px 20px; 
            font-size: 18px; 
            cursor: pointer; 
            background-color: #538d4e; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            font-weight: bold;
        }
        button:hover { background-color: #4CAF50; }
        .hidden { display: none !important; }
        .board { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin-top: 20px; 
        }
        .row { display: flex; gap: 8px; margin-bottom: 8px; }
        .cell { 
            width: 60px; 
            height: 60px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 28px; 
            font-weight: bold; 
            border-radius: 5px; 
            background-color: #3a3a3c; /* لون رصاصي للغلط */
        }
        .correct { background-color: #538d4e; } /* أخضر */
        .present { background-color: #b59f3b; } /* أصفر */
        .keyboard { 
            display: flex; 
            flex-wrap: wrap; 
            justify-content: center; 
            gap: 6px; 
            margin-top: 30px; 
            max-width: 400px; 
            margin-left: auto; 
            margin-right: auto; 
            direction: rtl;
        }
        .key { 
            padding: 10px; 
            border-radius: 5px; 
            background-color: #818384; 
            color: white; 
            font-weight: bold; 
            min-width: 25px; 
        }
        .key.used { 
            background-color: #1e1e1e; 
            color: #555; 
            border: 1px solid #333;
        }
    </style>
</head>
<body>

    <h2>لعبة ثلاث حروف 🎯</h2>

    <!-- شاشة إعداد الكلمة للهوست -->
    <div id="setup-section">
        <p>الهوست: حط كلمتك هنا (لا يشوفونك)</p>
        <input type="text" id="secret-word" maxlength="3" placeholder="الكلمة">
        <br><br>
        <button onclick="startGame()">ثبّت الكلمة</button>
    </div>

    <!-- شاشة اللعب والتخمين -->
    <div id="game-section" class="hidden">
        <input type="text" id="guess-input" maxlength="3" placeholder="تخمين الشباب">
        <button onclick="checkGuess()">جرب</button>
        
        <div class="board" id="board"></div>
        
        <h4 style="margin-top: 40px; color: #888;">الحروف اللي ما جربوها:</h4>
        <div class="keyboard" id="keyboard"></div>
    </div>

    <script>
        let secret = "";
        // قائمة الحروف العربية
        const letters = ["ا","ب","ت","ث","ج","ح","خ","د","ذ","ر","ز","س","ش","ص","ض","ط","ظ","ع","غ","ف","ق","ك","ل","م","ن","ه","و","ي","أ","إ","آ","ة","ى","ئ","ء","ؤ"];
        
        function startGame() {
            const word = document.getElementById('secret-word').value.trim();
            if(word.length !== 3) {
                alert("يا ذكي الكلمة لازم تكون 3 حروف بالتمام!");
                return;
            }
            secret = word;
            // إخفاء إعداد الكلمة وإظهار شاشة اللعب
            document.getElementById('setup-section').classList.add('hidden');
            document.getElementById('game-section').classList.remove('hidden');
            renderKeyboard();
        }

        function renderKeyboard() {
            const kb = document.getElementById('keyboard');
            kb.innerHTML = '';
            letters.forEach(l => {
                const span = document.createElement('span');
                span.id = 'key-' + l;
                span.className = 'key';
                span.innerText = l;
                kb.appendChild(span);
            });
        }

        function checkGuess() {
            const guess = document.getElementById('guess-input').value.trim();
            if(guess.length !== 3) {
                alert("التخمين بعد لازم يكون 3 حروف!");
                return;
            }

            const board = document.getElementById('board');
            const row = document.createElement('div');
            row.className = 'row';

            let secretArr = secret.split('');
            let guessArr = guess.split('');
            let status = ['absent', 'absent', 'absent'];

            // المرحلة الأولى: نشيك على الحروف اللي بمكانها الصح (أخضر)
            for(let i=0; i<3; i++) {
                if(guessArr[i] === secretArr[i]) {
                    status[i] = 'correct';
                    secretArr[i] = null; // نشطبه عشان ما ينحسب مرتين
                }
            }

            // المرحلة الثانية: نشيك على الحروف اللي بغير مكانها (أصفر)
            for(let i=0; i<3; i++) {
                if(status[i] === 'absent') {
                    let idx = secretArr.indexOf(guessArr[i]);
                    if(idx > -1) {
                        status[i] = 'present';
                        secretArr[idx] = null; // نشطبه
                    }
                }
            }

            // نرسم المربعات ونحدث حالة الكيبورد
            for(let i=0; i<3; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell ' + status[i];
                cell.innerText = guessArr[i];
                row.appendChild(cell);

                // نطفي الحرف من الكيبورد لأنه استُخدم
                let keyElement = document.getElementById('key-' + guessArr[i]);
                if(keyElement) {
                    keyElement.classList.add('used');
                }
            }

            board.appendChild(row);
            
            // فضي الخانة للتخمين الجاي
            document.getElementById('guess-input').value = "";
            document.getElementById('guess-input').focus();
        }
    </script>
</body>
</html>
