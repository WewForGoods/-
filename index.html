<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة ثلاث حروف</title>
    <style>
        body { 
            background-color: #121212; 
            color: #ffffff; 
            font-family: Arial, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
        }
        h2 { color: #4CAF50; margin-bottom: 10px;}
        input { 
            padding: 10px; 
            font-size: 20px; 
            text-align: center; 
            border-radius: 5px; 
            border: 2px solid #3a3a3c; 
            background-color: #2b2b2b;
            color: white;
            margin: 5px; 
            width: 150px;
        }
        button { 
            padding: 10px 20px; 
            font-size: 18px; 
            cursor: pointer; 
            background-color: #538d4e; 
            color: white; 
            border: none; 
            border-radius: 5px; 
            font-weight: bold;
        }
        button:hover { background-color: #4CAF50; }
        .hidden { display: none !important; }
        
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 500px;
            margin: 0 auto;
        }
        .host-info {
            background-color: #2b2b2b;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 14px;
            color: #aaa;
        }
        .host-info span { color: #fff; font-weight: bold; font-size: 18px; }
        
        /* تصميم صندوق السجل واللوحة المدمج */
        .history-board {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-height: 360px; /* يكفي تقريباً 5 تخمينات قبل السكرول */
            overflow-y: auto;
            background-color: #1e1e1e;
            border: 1px solid #3a3a3c;
            border-radius: 8px;
            padding: 15px 0;
            margin: 15px 0;
            scroll-behavior: smooth;
        }
        /* تجميل شريط السكرول */
        .history-board::-webkit-scrollbar { width: 8px; }
        .history-board::-webkit-scrollbar-thumb { background: #555; border-radius: 4px; }

        .row-wrapper { 
            display: flex; 
            align-items: center; 
            justify-content: center;
            gap: 15px; 
            width: 100%;
            margin-bottom: 8px;
        }
        .guess-number { 
            color: #888; 
            font-weight: bold; 
            font-size: 18px; 
            width: 25px; 
            text-align: right;
        }
        .row { display: flex; gap: 8px; }
        .cell { 
            width: 60px; 
            height: 60px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 28px; 
            font-weight: bold; 
            border-radius: 5px; 
            background-color: #3a3a3c; 
        }
        .correct { background-color: #538d4e; } /* أخضر */
        .present { background-color: #b59f3b; } /* أصفر */
        
        .keyboard { 
            display: flex; flex-wrap: wrap; justify-content: center; gap: 6px; 
            margin-top: 10px; direction: rtl;
        }
        .key { 
            padding: 10px; border-radius: 5px; background-color: #818384; 
            color: white; font-weight: bold; min-width: 25px; 
        }
        .key.used { background-color: #1e1e1e; color: #555; border: 1px solid #333; }
        
        .end-screen {
            background-color: #2b2b2b;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #538d4e;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <h2>لعبة ثلاث حروف 🎯</h2>

    <div id="setup-section">
        <p>الهوست: حط كلمتك هنا (لا يشوفونك)</p>
        <input type="text" id="secret-word" maxlength="3" placeholder="الكلمة">
        <br><br>
        <button onclick="startGame()">ثبّت الكلمة</button>
    </div>

    <div id="game-section" class="hidden game-container">
        
        <div class="host-info">كلمتك السرية: <span id="display-secret"></span></div>
        
        <div id="input-area">
            <input type="text" id="guess-input" maxlength="3" placeholder="تخمين الشباب">
            <button onclick="checkGuess()">جرب</button>
        </div>
        
        <div class="history-board" id="history-board" style="display: none;"></div>
        
        <div id="end-screen" class="end-screen hidden">
            <h3 id="end-message"></h3>
            <button onclick="resetGame()">البدء من جديد 🔄</button>
        </div>

        <h4 id="keyboard-title" style="margin-top: 20px; color: #888;">الحروف اللي ما جربوها:</h4>
        <div class="keyboard" id="keyboard"></div>
    </div>

    <script>
        let originalSecret = "";
        let normSecret = "";
        let guessCount = 0;
        
        function normalizeAlef(str) {
            return str.replace(/[أإآ]/g, 'ا');
        }

        const letters = ["ا","ب","ت","ث","ج","ح","خ","د","ذ","ر","ز","س","ش","ص","ض","ط","ظ","ع","غ","ف","ق","ك","ل","م","ن","ه","و","ي","ة","ى","ئ","ء","ؤ"];
        
        function startGame() {
            const word = document.getElementById('secret-word').value.trim();
            if(word.length !== 3) {
                alert("يا ذكي الكلمة لازم تكون 3 حروف بالتمام!");
                return;
            }
            
            originalSecret = word;
            normSecret = normalizeAlef(word);
            guessCount = 0;
            
            document.getElementById('display-secret').innerText = originalSecret;
            document.getElementById('setup-section').classList.add('hidden');
            document.getElementById('game-section').classList.remove('hidden');
            
            renderKeyboard();
            
            document.getElementById("guess-input").addEventListener("keypress", function(event) {
                if (event.key === "Enter") {
                    event.preventDefault();
                    checkGuess();
                }
            });
        }

        function renderKeyboard() {
            const kb = document.getElementById('keyboard');
            kb.innerHTML = '';
            letters.forEach(l => {
                const span = document.createElement('span');
                let normalizedL = normalizeAlef(l);
                span.id = 'key-' + normalizedL;
                span.className = 'key';
                span.innerText = l;
                kb.appendChild(span);
            });
        }

        function checkGuess() {
            const guessInput = document.getElementById('guess-input');
            const originalGuess = guessInput.value.trim();
            
            if(originalGuess.length !== 3) {
                alert("التخمين بعد لازم يكون 3 حروف!");
                return;
            }

            guessCount++;
            const normGuess = normalizeAlef(originalGuess);
            
            const historyBoard = document.getElementById('history-board');
            historyBoard.style.display = 'flex';

            const rowWrapper = document.createElement('div');
            rowWrapper.className = 'row-wrapper';

            const numSpan = document.createElement('span');
            numSpan.className = 'guess-number';
            numSpan.innerText = guessCount;

            const row = document.createElement('div');
            row.className = 'row';

            let secretArr = normSecret.split('');
            let guessArr = normGuess.split('');
            let displayArr = originalGuess.split('');
            let status = ['absent', 'absent', 'absent'];

            for(let i=0; i<3; i++) {
                if(guessArr[i] === secretArr[i]) {
                    status[i] = 'correct';
                    secretArr[i] = null; 
                }
            }

            for(let i=0; i<3; i++) {
                if(status[i] === 'absent') {
                    let idx = secretArr.indexOf(guessArr[i]);
                    if(idx > -1) {
                        status[i] = 'present';
                        secretArr[idx] = null; 
                    }
                }
            }

            for(let i=0; i<3; i++) {
                const cell = document.createElement('div');
                cell.className = 'cell ' + status[i];
                cell.innerText = displayArr[i];
                row.appendChild(cell);

                let keyElement = document.getElementById('key-' + guessArr[i]);
                if(keyElement) {
                    keyElement.classList.add('used');
                }
            }

            rowWrapper.appendChild(numSpan);
            rowWrapper.appendChild(row);
            historyBoard.appendChild(rowWrapper);
            
            // سكرول تلقائي لآخر تخمين عشان ما تتعب أصابعك
            historyBoard.scrollTop = historyBoard.scrollHeight;

            guessInput.value = "";
            guessInput.focus();

            if(normGuess === normSecret) {
                endGame();
            }
        }

        function endGame() {
            document.getElementById('input-area').classList.add('hidden');
            document.getElementById('keyboard').classList.add('hidden');
            document.getElementById('keyboard-title').classList.add('hidden');
            
            const endScreen = document.getElementById('end-screen');
            const endMessage = document.getElementById('end-message');
            
            endMessage.innerText = `🎉 مبروك! جابوها الشباب في ${guessCount} تخمينات!`;
            endScreen.classList.remove('hidden');
        }

        function resetGame() {
            document.getElementById('secret-word').value = '';
            document.getElementById('history-board').innerHTML = '';
            document.getElementById('history-board').style.display = 'none';
            
            document.getElementById('end-screen').classList.add('hidden');
            document.getElementById('input-area').classList.remove('hidden');
            document.getElementById('keyboard').classList.remove('hidden');
            document.getElementById('keyboard-title').classList.remove('hidden');
            
            document.getElementById('game-section').classList.add('hidden');
            document.getElementById('setup-section').classList.remove('hidden');
        }
    </script>
</body>
</html>
